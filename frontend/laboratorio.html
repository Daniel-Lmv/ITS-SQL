<script>
    const editor = document.getElementById('txt-sql-usuario');
    
    editor.addEventListener('input', () => {
        highlightConsole();
    });

    editor.addEventListener('keydown', (e) => {
        if (e.key === 'Tab') {
            e.preventDefault();
            const sel = window.getSelection();
            const range = sel.getRangeAt(0);
            const tabNode = document.createTextNode('    ');
            range.insertNode(tabNode);
            range.setStartAfter(tabNode);
            range.setEndAfter(tabNode);
            sel.removeAllRanges();
            sel.addRange(range);
        }
    });

    function highlightConsole() {
        const cursorPosition = getCaretPosition(editor);
        let texto = editor.innerText;
        
        editor.innerHTML = Prism.highlight(texto, Prism.languages.sql, 'sql');
        setCaretPosition(editor, cursorPosition);
    }

    function getCaretPosition(element) {
        let position = 0;
        const isSupported = typeof window.getSelection !== "undefined";
        if (isSupported) {
            const selection = window.getSelection();
            if (selection.rangeCount > 0) {
                const range = selection.getRangeAt(0);
                const preCaretRange = range.cloneRange();
                preCaretRange.selectNodeContents(element);
                preCaretRange.setEnd(range.startContainer, range.startOffset);
                position = preCaretRange.toString().length;
            }
        }
        return position;
    }

    function setCaretPosition(element, pos) {
        for (let node of element.childNodes) {
            if (node.nodeType === 3) {
                if (node.length >= pos) {
                    const range = document.createRange();
                    const sel = window.getSelection();
                    range.setStart(node, pos);
                    range.collapse(true);
                    sel.removeAllRanges();
                    sel.addRange(range);
                    return;
                } else {
                    pos -= node.length;
                }
            } else {
                let childLength = node.innerText ? node.innerText.length : node.textContent.length;
                if (childLength >= pos) {
                    setCaretPosition(node, pos);
                    return;
                } else {
                    pos -= childLength;
                }
            }
        }
    }
</script>

<script>
    const API_BASE_URL = 'http://127.0.0.1:8000';
    let listaQuestoes = [];
    let indiceAtual = 0;
    let chatHistory = [];
    let nomeConceitoGlobal = "SELECT";
    let conceitoIdGlobal = 1;

    const chatMessageArea = document.getElementById("chat-message-area");
    const chatInput = document.getElementById("chat-input");
    const chatSendBtn = document.getElementById("chat-send-btn");
    const txtSqlUsuario = document.getElementById("txt-sql-usuario");
    const labelProgresso = document.getElementById("label-progresso");
    const containerPassos = document.getElementById("container-passos");
    const btnEnviar = document.getElementById("btn-enviar");
    const textoBtnEnviar = document.getElementById("texto-btn-enviar");
    const btnLimpar = document.getElementById("btn-limpar");
    const btnPular = document.getElementById("btn-pular");

    window.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);
        conceitoIdGlobal = parseInt(urlParams.get('conceito')) || 1;
        
        carregarLaboratorioDoBanco(conceitoIdGlobal);
        carregarDadosReferencia();
    });

    btnLimpar.addEventListener("click", () => { 
        txtSqlUsuario.innerText = ""; 
        Prism.highlightElement(txtSqlUsuario);
    });
    btnPular.addEventListener("click", () => { registrarTentativaProficiencia(false); avancarLaboratorio(); });

    async function carregarLaboratorioDoBanco(conceitoId) {
        try {
            const response = await fetch(`${API_BASE_URL}/laboratorio/questoes/${conceitoId}`);
            if (!response.ok) throw new Error("Erro ao buscar laboratório no banco.");
            
            listaQuestoes = await response.json();
            
            if (listaQuestoes.length === 0) {
                exibirMensagemChat("PROFESSOR", "Nenhum laboratório disponível para este módulo.");
                return;
            }

            atualizarHUDProgresso();
            renderizarQuestaoAtual();

        } catch (error) {
            console.error(error);
            exibirMensagemChat("PROFESSOR", "Erro de conexão ao sincronizar com o banco SQLite do servidor.");
        }
    }

    async function carregarDadosReferencia() {
        const cabecalhoTabela = document.getElementById("cabecalho-tabela");
        const corpoTabela = document.getElementById("corpo-tabela");

        try {
            const response = await fetch(`${API_BASE_URL}/laboratorio/referencia/copas`);
            if (!response.ok) throw new Error("Erro ao buscar dados de referência.");

            const dados = await response.json();
            if (dados.length === 0) {
                corpoTabela.innerHTML = `<tr><td class="p-4 text-center text-outline-variant">Tabela vazia no banco de dados.</td></tr>`;
                return;
            }

            const colunas = Object.keys(dados[0]);
            cabecalhoTabela.innerHTML = colunas
                .map(col => `<th class="p-2 border-b border-outline-variant/20 bg-[#010914] text-primary font-bold uppercase whitespace-nowrap">${col}</th>`)
                .join("");

            corpoTabela.innerHTML = dados
                .map(linha => {
                    const celulas = colunas.map(col => `<td class="p-2 whitespace-nowrap text-on-surface-variant/90">${linha[col] ?? ''}</td>`).join("");
                    return `<tr class="hover:bg-surface-container/40 border-b border-outline-variant/5 transition-colors">${celulas}</tr>`;
                })
                .join("");

        } catch (error) {
            console.error(error);
            corpoTabela.innerHTML = `<tr><td class="p-4 text-center text-red-400">Falha ao se conectar com o servidor para puxar a tabela.</td></tr>`;
        }
    }

    function renderizarQuestaoAtual() {
        const questao = listaQuestoes[indiceAtual];
        
        chatMessageArea.innerHTML = "";
        chatHistory = []; 
        exibirMensagemChat("PROFESSOR", `**Desafio Prático:** ${questao.enunciado}\n\nEscreva sua query ao lado no console e clique em **Enviar Resposta** para eu validar estruturalmente.`);
        
        txtSqlUsuario.innerText = "";
        document.getElementById("lab-titulo").textContent = `Exercício ${indiceAtual + 1}: Prática Discursiva`;
        destacarBolinhaAtiva();
    }

    function exibirMensagemChat(autor, texto) {
        const div = document.createElement('div');
        const belongsToUser = autor === "VOCÊ";
        div.className = belongsToUser ? "flex flex-col gap-1 max-w-[85%] ml-auto items-end" : "flex flex-col gap-1 max-w-[85%]";
        
        const labelStyle = belongsToUser ? "text-secondary mr-1" : "text-primary ml-1";
        const bubbleStyle = belongsToUser ? "bg-secondary/10 border-secondary/30 rounded-tr-none text-on-surface" : "bg-surface-container-highest border-outline-variant/20 rounded-tl-none text-on-surface";

        let textoFormatado = texto;
        textoFormatado = textoFormatado.replace(/```sql([\s\S]*?)```/g, function(match, code) {
            return `<pre class="bg-surface-container-lowest/80 text-secondary font-mono text-[12px] p-2.5 rounded-md border border-outline-variant/40 my-2 overflow-x-auto w-full select-all"><code>${code.trim()}</code></pre>`;
        });
        textoFormatado = textoFormatado.replace(/`([^`]+)`/g, '<code class="bg-surface-container border border-outline-variant/30 px-1 py-0.5 rounded text-primary-fixed-dim font-mono text-[12px]">$1</code>');
        textoFormatado = textoFormatado.replace(/\*\*([^*]+)\*\*/g, '<strong class="font-bold text-white">$1</strong>');

        div.innerHTML = `
            <span class="text-[10px] font-mono ${labelStyle}">${autor}</span>
            <div class="p-2.5 rounded-lg border text-[13px] leading-relaxed ${bubbleStyle}">${textoFormatado}</div>
        `;
        chatMessageArea.appendChild(div);
        chatMessageArea.scrollTop = chatMessageArea.scrollHeight;
    }

    function exibirMensagemLoading() {
        const id = "loading-" + Date.now();
        const div = document.createElement('div');
        div.id = id;
        div.className = "flex flex-col gap-1 max-w-[85%]";
        div.innerHTML = `
            <span class="text-[10px] font-mono text-primary ml-1 animate-pulse">PROFESSOR</span>
            <div class="bg-surface-container-highest/60 p-2.5 rounded-lg rounded-tl-none border border-outline-variant/10 text-[13px] text-on-surface/70 italic flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-primary animate-bounce"></span>
                Analisando sintaxe...
            </div>
        `;
        chatMessageArea.appendChild(div);
        chatMessageArea.scrollTop = chatMessageArea.scrollHeight;
        return id;
    }

    async function enviarDuvidaChat() {
        const payloadText = chatInput.value.trim();
        if (!payloadText) return;

        exibirMensagemChat("VOCÊ", payloadText);
        chatInput.value = '';
        chatHistory.push({ role: "user", content: payloadText });

        const qCorrente = listaQuestoes[indiceAtual] || {};
        const loadingId = exibirMensagemLoading();

        try {
            const response = await fetch(`${API_BASE_URL}/tutor/chat/professor-virtual`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    dados_questao: {
                        enunciado: qCorrente.enunciado || 'Nenhum enunciado ativo',
                        resposta_correta: "Query de Gabarito Interna", 
                        resposta_aluno: txtSqlUsuario.innerText || 'Nenhuma query digitada',
                        conceito_nome: nomeConceitoGlobal
                    },
                    historico_mensagens: chatHistory
                })
            });
            
            document.getElementById(loadingId)?.remove();

            const data = await response.json();
            if (data.response) {
                exibirMensagemChat("PROFESSOR", data.response);
                chatHistory.push({ role: "assistant", content: data.response });
            }
        } catch (error) {
            document.getElementById(loadingId)?.remove();
            exibirMensagemChat("PROFESSOR", "Tive uma instabilidade ao processar a dúvida com a IA. Pode reenviar?");
        }
    }

    // DISPARA A ATUALIZAÇÃO DA PROFICIÊNCIA DO ALUNO NO MODELO DE DIAGNÓSTICO DO BACKEND
    async function registrarTentativaProficiencia(acertou) {
        try {
            await fetch(`${API_BASE_URL}/diagnostic/responder`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    conceito_id: conceitoIdGlobal,
                    acertou: acertou
                })
            });
        } catch (error) {
            console.error("Erro ao registrar proficiência de diagnóstico:", error);
        }
    }

    function atualizarHUDProgresso() {
        labelProgresso.textContent = `Questão ${indiceAtual + 1} de ${listaQuestoes.length}`;
        containerPassos.innerHTML = "";
        listaQuestoes.forEach((_, i) => {
            const dot = document.createElement("div");
            dot.id = `hud-dot-${i}`;
            dot.className = "w-2.5 h-2.5 rounded-full bg-surface-container-highest border border-outline-variant/30 transition-all duration-300";
            containerPassos.appendChild(dot);
        });
    }

    function destacarBolinhaAtiva() {
        listaQuestoes.forEach((_, i) => {
            const d = document.getElementById(`hud-dot-${i}`);
            if (!d) return;
            if (i === indiceAtual) {
                d.className = "w-2.5 h-2.5 rounded-full bg-primary/30 border-2 border-primary scale-110 transition-all";
            } else if (i < indiceAtual) {
                d.className = "w-2.5 h-2.5 rounded-full bg-secondary border border-secondary shadow-[0_0_8px_rgba(78,222,163,0.4)]";
            } else {
                d.className = "w-2.5 h-2.5 rounded-full bg-surface-container-highest border border-outline-variant/30 transition-all";
            }
        });
    }

    btnEnviar.addEventListener("click", async () => {
        const codigoUsuario = txtSqlUsuario.innerText.trim();
        
        if (!codigoUsuario) {
            exibirMensagemChat("PROFESSOR", "Por favor, digite sua consulta SQL antes de tentar enviar o código para validação!");
            return;
        }

        textoBtnEnviar.textContent = "Processando...";
        btnEnviar.disabled = true;

        try {
            const questao = listaQuestoes[indiceAtual];
            const response = await fetch(`${API_BASE_URL}/laboratorio/verificar`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    questao_id: questao.id,
                    query_usuario: codigoUsuario
                })
            });

            if (!response.ok) throw new Error("Erro na resposta do servidor.");
            const dadosValidacao = await response.json();

            if (dadosValidacao.correto) {
                exibirMensagemChat("PROFESSOR", `**Acerto Confirmado!** 🎉\n\n${dadosValidacao.mensagem}`);
                
                // NOTIFICA O BACKEND DO ACERTO PARA ELEVAÇÃO DA PROFICIÊNCIA COGNITIVA
                await registrarTentativaProficiencia(true);

                setTimeout(() => {
                    avancarLaboratorio();
                }, 2200);
            } else {
                exibirMensagemChat("PROFESSOR", `❌ **Ajuste Necessário:**\n\n${dadosValidacao.mensagem}\n\nCaso tenha dúvidas sobre como ajustar o seu código, use o campo de texto abaixo para conversar comigo!`);
                
                // NOTIFICA O BACKEND DO ERRO PARA AJUSTAR O NÍVEL DE APRENDIZADO
                await registrarTentativaProficiencia(false);
            }

        } catch (error) {
            console.error(error);
            exibirMensagemChat("PROFESSOR", "Falha crítica ao conectar com o validador remoto do banco de dados.");
        } finally {
            textoBtnEnviar.textContent = "Enviar Resposta";
            btnEnviar.disabled = false;
        }
    });

    function avancarLaboratorio() {
        if (indiceAtual < listaQuestoes.length - 1) {
            indiceAtual++;
            labelProgresso.textContent = `Questão ${indiceAtual + 1} de ${listaQuestoes.length}`;
            renderizarQuestaoAtual();
        } else {
            exibirMensagemChat("PROFESSOR", "🏆 **Laboratório Concluído!** Maravilhoso, você atingiu os objetivos práticos propostos. Redirecionando para o menu principal...");
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 2500);
        }
    }

    chatSendBtn.addEventListener('click', enviarDuvidaChat);
    chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') enviarDuvidaChat(); });
</script>
</body></html>
